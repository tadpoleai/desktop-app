# Codeup 流水线 — Hera Desktop Linux 安装包构建
# 触发条件：推送 master/dev 分支或手动触发
#
# 使用前需要填写两类服务连接 ID（在 Codeup 组织设置 → 服务连接 中创建）：
#   CODE_SC_ID   — 代码源服务连接（类型选"Codeup"，用于 checkout 本仓库）
#   PKG_SC_ID    — 制品库服务连接（类型选"通用制品库"，用于上传安装包）
#
# 创建代码源服务连接步骤：
#   组织设置 → 服务连接 → 新建 → 选"Codeup" → OAuth 授权 → 记下生成的连接 ID

sources:
  app_repo:
    type: codeup
    name: Hera Desktop 代码源
    endpoint: https://codeup.aliyun.com/<your-org>/hera-desktop.git
    branch: master
    # ↓ 必填：代码源服务连接 ID（Codeup 组织设置 → 服务连接 → 新建 Codeup 类型）
    certificate:
      type: serviceConnection
      serviceConnection: <CODE_SC_ID>

stages:
  build_stage:
    name: "构建 Linux 安装包"
    jobs:
      tauri_linux_job:
        name: "Tauri .deb / AppImage 构建"
        # ubuntu22 容器：与本机开发环境一致，WebKitGTK 4.1 可直接 apt 安装
        runsOn:
          group: public/cn-beijing
          container: build-steps-public-registry.cn-beijing.cr.aliyuncs.com/build-steps/ubuntu22:latest
        steps:

          # ── 1. 系统依赖 ────────────────────────────────────────────────────
          install_sys_deps_step:
            name: "安装系统依赖 (WebKitGTK / GTK3)"
            step: Command
            with:
              run: |
                apt-get update -y
                apt-get install -y --no-install-recommends \
                  libwebkit2gtk-4.1-dev \
                  libappindicator3-dev \
                  librsvg2-dev \
                  patchelf \
                  libgtk-3-dev \
                  libssl-dev \
                  libsoup-3.0-dev \
                  libjavascriptcoregtk-4.1-dev \
                  curl \
                  file \
                  build-essential \
                  pkg-config

          # ── 2. Rust ────────────────────────────────────────────────────────
          install_rust_step:
            name: "安装 Rust stable"
            step: Command
            with:
              run: |
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                  | sh -s -- -y --no-modify-path --default-toolchain stable
                # 将 cargo/bin 加入后续步骤的 PATH
                echo "$HOME/.cargo/bin" >> $FLOW_PATH
                # 验证
                "$HOME/.cargo/bin/rustc" --version

          # ── 3. Node.js ─────────────────────────────────────────────────────
          setup_node_step:
            name: "安装 Node.js 20"
            step: SetupNode
            with:
              versionType: predefined
              nodeVersion: "20"
              npmType: npm

          # ── 4. 前端依赖 ────────────────────────────────────────────────────
          npm_install_step:
            name: "npm ci"
            step: Command
            with:
              run: npm ci

          # ── 5. Tauri 打包 ──────────────────────────────────────────────────
          tauri_build_step:
            name: "npm run tauri build"
            step: Command
            with:
              run: |
                # 打包产物位于 src-tauri/target/release/bundle/
                #   deb/        → *.deb (Debian/Ubuntu 安装包)
                #   appimage/   → *.AppImage (通用 Linux)
                #   rpm/        → *.rpm (如果启用)
                npm run tauri build
                echo "=== 产物列表 ==="
                find src-tauri/target/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" \)

          # ── 6. 上传制品 ────────────────────────────────────────────────────
          # 上传 .deb 包到 Codeup 制品库（通用制品库）
          upload_deb_step:
            name: "上传 .deb 安装包"
            step: ArtifactUpload
            with:
              uploadType: packages
              # ↓ 在 Codeup 组织设置 → 服务连接 中创建"通用制品库"连接后填写其 ID
              serviceConnection: <your-service-connection-id>
              repo: hera_releases
              artifact: "hera-desktop-linux"
              filePath: "src-tauri/target/release/bundle/deb/"
              version: "${BUILD_NUMBER}"

          # （可选）同时上传 AppImage
          upload_appimage_step:
            name: "上传 AppImage"
            step: ArtifactUpload
            with:
              uploadType: packages
              serviceConnection: <your-service-connection-id>
              repo: hera_releases
              artifact: "hera-desktop-appimage"
              filePath: "src-tauri/target/release/bundle/appimage/"
              version: "${BUILD_NUMBER}"
